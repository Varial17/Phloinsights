<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plantman Insights — Plantman Equipment</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --surface2: #eeede9;
    --border: rgba(0,0,0,0.07);
    --border2: rgba(0,0,0,0.13);
    --teal: #D42027;
    --teal-dim: rgba(212,32,39,0.08);
    --teal-mid: rgba(212,32,39,0.28);
    --text: #111111;
    --text-2: #555555;
    --text-3: #999999;
    --red: #E53935;
    --amber: #E8900A;
    --font-head: 'Satoshi', sans-serif;
    --font-body: 'Manrope', sans-serif;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

  #root { display: flex; flex-direction: column; min-height: 100vh; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

  /* Global chart canvas */
  canvas { display: block; }

  /* Utility */
  .teal { color: var(--teal); }
  .muted { color: var(--text-2); }
  .red { color: var(--red); }
  .amber { color: var(--amber); }

  /* Narrative text */
  .narrative {
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.75;
    color: var(--text-2);
    max-width: 820px;
    text-wrap: pretty;
  }
  .narrative strong { color: var(--text); font-weight: 600; }
  .narrative .hl { color: #D42027; font-weight: 600; }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
  }
  .card-sm { padding: 16px 20px; }

  /* Labels */
  .label {
    font-family: var(--font-body);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-3);
  }

  /* Section headers */
  .section-eyebrow {
    font-family: var(--font-body);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 8px;
  }
  .section-title {
    font-family: var(--font-head);
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 16px;
  }

  /* Dividers */
  .divider { height: 1px; background: var(--border); margin: 32px 0; }
  .divider-sm { height: 1px; background: var(--border); margin: 20px 0; }

  /* Insight headline box */
  .insight-box {
    background: var(--teal-dim);
    border: 1px solid var(--teal-mid);
    border-radius: 6px;
    padding: 18px 22px;
    margin-bottom: 24px;
  }
  .insight-box p {
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.7;
    color: #333333;
    text-wrap: pretty;
  }
  .insight-box p strong { color: #9a1a1e; }

  /* Action items */
  .action-item {
    display: flex;
    gap: 16px;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
  }
  .action-item:last-child { border-bottom: none; }
  .action-rank {
    font-family: var(--font-head);
    font-size: 28px;
    font-weight: 700;
    color: var(--teal);
    min-width: 36px;
    line-height: 1;
    padding-top: 2px;
  }

  /* Score ring */
  .score-ring-wrap { position: relative; width: 160px; height: 160px; }

  /* Trend badge */
  .trend-up { color: var(--teal); }
  .trend-down { color: var(--red); }

  /* Table */
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th {
    font-family: var(--font-body);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-3);
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .data-table td {
    padding: 10px 12px;
    font-size: 13px;
    color: var(--text-2);
    border-bottom: 1px solid var(--border);
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: rgba(0,0,0,0.01); }

  /* Sparkline bar */
  .spark-bar { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .spark-bar-fill { height: 100%; border-radius: 2px; background: var(--teal); transition: width 0.6s ease; }

  /* Page content */
  .page-content {
    max-width: 1280px;
    margin: 0 auto;
    padding: 40px 48px 80px;
    width: 100%;
  }

  /* Grid layouts */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
  .grid-1-2 { display: grid; grid-template-columns: 1fr 2fr; gap: 16px; }

  @media (max-width: 960px) {
    .grid-2, .grid-3, .grid-4, .grid-2-1, .grid-1-2 { grid-template-columns: 1fr; }
    .page-content { padding: 24px 20px 60px; }
  }

  /* Status dots */
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .dot-green { background: #22a85a; }
  .dot-amber { background: var(--amber); }
  .dot-red { background: var(--red); }

  /* Loading state */
  #app-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 16px;
  }
  .loading-spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border2);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Tweaks panel */
  #tweaks-panel {
    display: none;
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #ffffff;
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 20px;
    width: 260px;
    z-index: 9999;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
  }
  #tweaks-panel.open { display: block; }
  .tweak-title { font-family: var(--font-head); font-weight: 700; font-size: 13px; color: var(--text); margin-bottom: 16px; letter-spacing: 0.02em; }
  .tweak-row { margin-bottom: 14px; }
  .tweak-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); margin-bottom: 6px; }
  .tweak-select, .tweak-range {
    width: 100%; background: var(--bg); border: 1px solid var(--border2);
    color: var(--text); padding: 6px 10px; border-radius: 5px; font-size: 12px; font-family: var(--font-body);
    outline: none;
  }
  .tweak-range { padding: 4px 0; cursor: pointer; accent-color: var(--teal); }
</style>
</head>
<body>

<div id="app-loading">
  <div class="loading-spinner"></div>
  <div style="font-family: var(--font-body); font-size: 12px; color: var(--text-3); letter-spacing: 0.08em; text-transform: uppercase;">Loading Plantman Insights…</div>
</div>

<div id="root"></div>

<div id="tweaks-panel">
  <div class="tweak-title">Tweaks</div>
  <div class="tweak-row">
    <div class="tweak-label">Accent Color</div>
    <select class="tweak-select" id="tweak-accent">
      <option value="#D42027">Plantman Red (default)</option>
      <option value="#7B61FF">Electric Violet</option>
      <option value="#FF7A45">Ember Orange</option>
      <option value="#4FC3F7">Ice Blue</option>
    </select>
  </div>
  <div class="tweak-row">
    <div class="tweak-label">Information Density</div>
    <select class="tweak-select" id="tweak-density">
      <option value="normal">Normal</option>
      <option value="compact">Compact</option>
      <option value="spacious">Spacious</option>
    </select>
  </div>
  <div class="tweak-row">
    <div class="tweak-label">Health Score</div>
    <input type="range" class="tweak-range" id="tweak-score" min="40" max="99" value="72">
    <div style="text-align:right;font-size:11px;color:var(--text-2);margin-top:4px;" id="tweak-score-val">72</div>
  </div>
</div>

<script type="text/babel" src="phlo-shared.jsx?v=3"></script>
<script type="text/babel" src="phlo-overview.jsx?v=3"></script>
<script type="text/babel" src="phlo-procurement.jsx?v=3"></script>
<script type="text/babel" src="phlo-assets.jsx?v=3"></script>
<script type="text/babel" src="phlo-cashflow.jsx?v=3"></script>
<script type="text/babel" src="phlo-jobs.jsx?v=3"></script>
<script type="text/babel" src="phlo-pipeline.jsx?v=3"></script>
<script type="text/babel" src="phlo-app.jsx?v=3"></script>

<script>
// Tweaks system
const TWEAK_DEFAULTS = {
  "accent": "#D42027",
  "density": "normal",
  "score": 73
};

window.__tweaks = { ...TWEAK_DEFAULTS };

window.addEventListener('message', e => {
  if (e.data?.type === '__activate_edit_mode') {
    document.getElementById('tweaks-panel').classList.add('open');
  } else if (e.data?.type === '__deactivate_edit_mode') {
    document.getElementById('tweaks-panel').classList.remove('open');
  }
});
window.parent.postMessage({ type: '__edit_mode_available' }, '*');

document.getElementById('tweak-accent').value = TWEAK_DEFAULTS.accent;
document.documentElement.style.setProperty('--teal', TWEAK_DEFAULTS.accent);
document.documentElement.style.setProperty('--teal-dim', 'rgba(212,32,39,0.08)');
document.documentElement.style.setProperty('--teal-mid', 'rgba(212,32,39,0.28)');
document.getElementById('tweak-density').value = TWEAK_DEFAULTS.density;
document.getElementById('tweak-score').value = TWEAK_DEFAULTS.score;
document.getElementById('tweak-score-val').textContent = TWEAK_DEFAULTS.score;

document.getElementById('tweak-accent').addEventListener('change', e => {
  const v = e.target.value;
  window.__tweaks.accent = v;
  document.documentElement.style.setProperty('--teal', v);
  document.documentElement.style.setProperty('--teal-dim', v + '1e');
  document.documentElement.style.setProperty('--teal-mid', v + '59');
  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accent: v } }, '*');
});

document.getElementById('tweak-density').addEventListener('change', e => {
  const v = e.target.value;
  window.__tweaks.density = v;
  const pad = v === 'compact' ? '24px 32px 60px' : v === 'spacious' ? '60px 64px 100px' : '40px 48px 80px';
  document.querySelectorAll('.page-content').forEach(el => el.style.padding = pad);
  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { density: v } }, '*');
});

document.getElementById('tweak-score').addEventListener('input', e => {
  const v = parseInt(e.target.value);
  window.__tweaks.score = v;
  document.getElementById('tweak-score-val').textContent = v;
  window.__setScore && window.__setScore(v);
  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { score: v } }, '*');
});

// Hide loading once React mounts
window.__appReady = () => {
  const loading = document.getElementById('app-loading');
  if (loading) loading.style.display = 'none';
};
</script>
</body>
</html>
